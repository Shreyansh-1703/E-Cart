spring.application.name=ecart-backend
server.port=8080
spring.main.allow-circular-references=true

# ── Database: MySQL (commented out due to connection failure) ────────
# spring.datasource.url=jdbc:mysql://localhost:3306/ecart_db
# spring.datasource.username=root
# spring.datasource.password=Shreyansh@1703

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 In-Memory (ENABLED to run without MySQL) ─────
spring.datasource.url=jdbc:h2:mem:ecart;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────
# IMPORTANT: Set JWT_SECRET env var in production (min 64 chars)
jwt.secret=${JWT_SECRET:ECart2024SuperSecretKeyForJWTTokenGenerationAndValidationMustBe64CharsLong!!REPLACE_IN_PROD}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── CORS ──────────────────────────────────────────────
# No wildcard (*) and no "null" origin — list explicit origins only
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:5178,http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://127.0.0.1:8080}

# ── Demo Mode ─────────────────────────────────────────
# Set to true ONLY for demos — allows any credentials to log in
app.demo-mode=${DEMO_MODE:true}

# ── Logging ───────────────────────────────────────────
logging.level.com.ecart=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# data.sql removed — seeding is handled entirely by DataSeeder.java
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ── Startup banner ────────────────────────────────────
spring.main.banner-mode=console

# ── Jackson ───────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ── Railway Delivery API ──────────────────────────────
railway.api.key=DEMO_KEY
railway.api.base-url=https://api.railwayapi.com/v2

